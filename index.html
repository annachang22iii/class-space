<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>班級小宇宙 | 作業獎勵管理平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 SheetJS 解析 Excel (.xlsx / .csv) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <style>
    body { background-color: #f3f4f6; font-family: system-ui, -apple-system, sans-serif; }
    .tab-active { border-bottom: 3px solid #10b981; color: #059669; font-weight: bold; }
  </style>
</head>
<body class="p-2 md:p-6 text-gray-800">

  <!-- 雲端狀態條 -->
  <div id="cloud-bar" class="mb-4 p-3 bg-amber-500 text-white rounded-xl flex flex-col sm:flex-row justify-between items-center text-sm gap-2 shadow">
    <span id="cloud-status">⚠️ 目前為「單機離線模式」（更換電腦資料不會同步）</span>
    <div class="flex gap-2">
      <button onclick="clearLocalCache()" class="bg-amber-700 text-white px-3 py-1 rounded-lg text-xs hover:bg-amber-800 transition">
        🧹 重設/清除舊暫存
      </button>
      <button onclick="openFirebaseModal()" class="bg-white text-amber-800 px-3 py-1 rounded-lg font-bold hover:bg-amber-100 transition">
        ⚙️ 設定 Firebase 雲端金鑰
      </button>
    </div>
  </div>

  <!-- 頁頭與主選單 -->
  <header class="bg-white rounded-2xl p-4 md:p-6 shadow-sm mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
    <div>
      <h1 class="text-2xl md:text-3xl font-extrabold text-emerald-700 flex items-center gap-2">
        <span>🌱</span> <span id="header-class-name">班級小宇宙</span> | 作業獎勵管理平台
      </h1>
      <p class="text-xs md:text-sm text-gray-500 mt-1" id="header-subtitle">智慧作業繳交 × 班級銀行</p>
    </div>
    <div class="flex gap-2 w-full md:w-auto">
      <button onclick="switchTab('submit')" class="flex-1 md:flex-none px-4 py-2 rounded-xl bg-emerald-600 text-white font-bold hover:bg-emerald-700">📷 條碼繳交 (前台)</button>
      <button onclick="switchTab('view')" class="flex-1 md:flex-none px-4 py-2 rounded-xl bg-amber-500 text-white font-bold hover:bg-amber-600">🐣 學生檢視 (前台)</button>
      <button onclick="switchTab('admin')" class="flex-1 md:flex-none px-4 py-2 rounded-xl bg-slate-800 text-white font-bold hover:bg-slate-900">🔒 教師後台</button>
    </div>
  </header>

  <!-- 區塊 1: 條碼繳交 (前台) -->
  <main id="sec-submit" class="space-y-6">
    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 max-w-xl mx-auto text-center space-y-4">
      <h2 class="text-xl font-bold text-gray-700">📚 學生作業快速繳交</h2>
      <div class="space-y-2 text-left">
        <label class="block text-sm text-gray-500 font-bold">選擇作業項目：</label>
        <select id="submit-hw-select" class="w-full p-3 border rounded-xl bg-gray-50 text-base font-bold text-emerald-700"></select>
      </div>
      <div class="space-y-2 text-left">
        <label class="block text-sm text-gray-500 font-bold">選擇學生（或感應條碼）：</label>
        <select id="submit-student-select" class="w-full p-3 border rounded-xl bg-gray-50 text-base font-bold text-gray-700"></select>
      </div>
      <button onclick="handleQuickSubmit()" class="w-full py-4 bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold text-lg rounded-xl shadow-md transition">
        🔔 模擬條碼感應完成繳交
      </button>
    </div>
  </main>

  <!-- 區塊 2: 學生檢視 (前台) -->
  <main id="sec-view" class="hidden space-y-6">
    <div class="bg-white rounded-2xl p-6 shadow-sm">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold text-gray-800">🏆 班級財富排行榜</h2>
        <span id="currency-tag" class="bg-amber-100 text-amber-800 px-3 py-1 rounded-full text-xs font-bold">貨幣：💰元</span>
      </div>
      <div id="student-cards-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
    </div>
  </main>

  <!-- 區塊 3: 教師後台 -->
  <main id="sec-admin" class="hidden space-y-6">
    <div class="bg-white rounded-2xl p-6 shadow-sm border-t-4 border-slate-800">
      <div class="flex border-b mb-6 overflow-x-auto gap-2">
        <button onclick="switchAdminTab('quick')" id="atab-quick" class="px-4 py-2 font-bold tab-active whitespace-nowrap">📝 課堂快速表揚</button>
        <button onclick="switchAdminTab('students')" id="atab-students" class="px-4 py-2 font-bold text-gray-500 whitespace-nowrap">👥 學生管理 (含Excel匯入)</button>
        <button onclick="switchAdminTab('hw')" id="atab-hw" class="px-4 py-2 font-bold text-gray-500 whitespace-nowrap">📋 作業與規則管理</button>
        <button onclick="switchAdminTab('settings')" id="atab-settings" class="px-4 py-2 font-bold text-gray-500 whitespace-nowrap">⚙️ 班級設定</button>
      </div>

      <!-- 子分頁 1: 課堂表揚 -->
      <div id="asec-quick" class="space-y-6">
        <div class="bg-emerald-50 p-4 rounded-xl border border-emerald-200">
          <h3 class="font-bold text-emerald-800 mb-2">🌟 課堂一鍵給獎勵</h3>
          <p class="text-xs text-gray-500 mb-3">先選擇學生，再點擊下方快捷按鈕即可發放：</p>
          <div class="mb-4">
            <select id="admin-quick-student-select" class="p-2 border rounded-lg bg-white w-full sm:w-64 font-bold"></select>
          </div>
          <div id="quick-btn-container" class="flex flex-wrap gap-2"></div>
        </div>
      </div>

      <!-- 子分頁 2: 學生管理 -->
      <div id="asec-students" class="hidden space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- 單一新增 -->
          <div class="bg-gray-50 p-4 rounded-xl border space-y-3">
            <h4 class="font-bold text-sm text-gray-700">➕ 新增單一學生</h4>
            <div class="flex gap-2">
              <input type="number" id="new-st-seat" placeholder="座號" class="w-20 p-2 border rounded-lg text-sm">
              <input type="text" id="new-st-name" placeholder="學生姓名" class="flex-1 p-2 border rounded-lg text-sm">
              <button onclick="addNewStudent()" class="px-4 py-2 bg-emerald-600 text-white font-bold rounded-lg text-sm hover:bg-emerald-700">新增</button>
            </div>
          </div>

          <!-- Excel 匯入 -->
          <div class="bg-emerald-50 p-4 rounded-xl border border-emerald-200 space-y-3">
            <h4 class="font-bold text-sm text-emerald-800">📊 Excel 學生名單批次匯入</h4>
            <p class="text-xs text-gray-500">直接貼上 Excel 複製的內容（座號 姓名）：</p>
            <textarea id="batch-excel-input" rows="3" class="w-full p-2 border rounded-lg text-xs font-mono" placeholder="1  張小明&#10;2  李小華"></textarea>
            <div class="flex justify-between items-center">
              <input type="file" id="excel-file-input" accept=".xlsx, .xls, .csv" onchange="handleExcelUpload(event)" class="text-xs text-gray-500">
              <button onclick="processBatchInput()" class="px-4 py-2 bg-emerald-600 text-white font-bold rounded-lg text-xs hover:bg-emerald-700">匯入貼上內容</button>
            </div>
          </div>
        </div>

        <div>
          <div class="flex justify-between items-center mb-3">
            <h3 class="font-bold text-gray-700">學生名單</h3>
            <button onclick="confirmClearAllStudents()" class="text-xs bg-red-100 text-red-600 px-3 py-1 rounded-lg font-bold hover:bg-red-200">⚠️ 清空全班學生名單</button>
          </div>
          <div id="admin-student-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3"></div>
        </div>
      </div>

      <!-- 子分頁 3: 作業管理 -->
      <div id="asec-hw" class="hidden space-y-4 max-w-lg">
        <h3 class="font-bold text-gray-700">➕ 新增作業項目</h3>
        <div class="space-y-2">
          <input type="text" id="new-hw-title" placeholder="作業名稱 (例：國語習作第1課)" class="w-full p-2 border rounded-lg text-sm">
          <input type="text" id="new-hw-reward" placeholder="獎勵金額 (例如 30)" class="w-full p-2 border rounded-lg text-sm" value="30">
          <button onclick="addHomework()" class="w-full py-2 bg-emerald-600 text-white font-bold rounded-lg text-sm hover:bg-emerald-700">+ 新增作業規則</button>
        </div>
        <hr class="my-4">
        <h4 class="font-bold text-gray-700 text-sm">現有作業列表：</h4>
        <ul id="hw-rule-list" class="space-y-2 text-sm"></ul>
      </div>

      <!-- 子分頁 4: 班級設定 -->
      <div id="asec-settings" class="hidden space-y-4 max-w-lg">
        <h3 class="font-bold text-gray-700">基本參數設定</h3>
        <div>
          <label class="block text-sm text-gray-500">班級名稱：</label>
          <input type="text" id="cfg-class-name" class="w-full p-2 border rounded-lg text-sm">
        </div>
        <div>
          <label class="block text-sm text-gray-500">班級貨幣名稱：</label>
          <input type="text" id="cfg-currency-name" class="w-full p-2 border rounded-lg text-sm">
        </div>
        <button onclick="saveClassSettings()" class="px-4 py-2 bg-slate-800 text-white rounded-lg font-bold text-sm hover:bg-slate-900">儲存班級設定</button>
      </div>
    </div>
  </main>

  <!-- 彈跳視窗 1: 編輯學生姓名 -->
  <div id="modal-edit-student" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl p-6 max-w-sm w-full space-y-4 shadow-xl">
      <h3 class="text-lg font-bold text-gray-800">✏️ 編輯學生姓名</h3>
      <input type="hidden" id="edit-st-id">
      <div>
        <label class="block text-xs text-gray-500 mb-1">學生姓名：</label>
        <input type="text" id="edit-st-name-input" class="w-full p-2 border rounded-lg font-bold text-base">
      </div>
      <div class="flex justify-end gap-2">
        <button onclick="closeModal('modal-edit-student')" class="px-4 py-2 bg-gray-200 rounded-xl font-bold text-xs">取消</button>
        <button onclick="saveStudentName()" class="px-4 py-2 bg-emerald-600 text-white rounded-xl font-bold text-xs">儲存變更</button>
      </div>
    </div>
  </div>

  <!-- 彈跳視窗 2: 手動加減分 -->
  <div id="modal-adjust" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl p-6 max-w-md w-full space-y-4 shadow-xl">
      <h3 id="adjust-modal-title" class="text-lg font-bold text-gray-800">手動調整資產</h3>
      <input type="hidden" id="adjust-student-id">
      <div>
        <label class="block text-sm text-gray-500">變動金額 (正數加分，負數扣分)：</label>
        <input type="number" id="adjust-amount" class="w-full p-2 border rounded-lg font-bold text-lg" placeholder="例如: 20 或 -10">
      </div>
      <div>
        <label class="block text-sm text-gray-500">事由說明：</label>
        <input type="text" id="adjust-reason" class="w-full p-2 border rounded-lg text-sm" placeholder="例如：午掃認真、未帶課本">
      </div>
      <div class="flex justify-end gap-2">
        <button onclick="closeModal('modal-adjust')" class="px-4 py-2 bg-gray-200 rounded-xl font-bold text-xs">取消</button>
        <button onclick="submitStudentAdjust()" class="px-4 py-2 bg-emerald-600 text-white rounded-xl font-bold text-xs">確認儲存</button>
      </div>
    </div>
  </div>

  <!-- 彈跳視窗 3: Firebase 配置 -->
  <div id="modal-firebase" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl p-6 max-w-lg w-full space-y-4 shadow-xl">
      <h3 class="text-lg font-bold text-gray-800">⚙️ 設定 Firebase 跨電腦同步金鑰</h3>
      <textarea id="firebase-config-input" rows="6" class="w-full p-3 border font-mono text-xs rounded-xl bg-gray-50" placeholder="const firebaseConfig = { ... };"></textarea>
      <div class="flex justify-end gap-2">
        <button onclick="closeModal('modal-firebase')" class="px-4 py-2 bg-gray-200 rounded-xl font-bold text-xs">取消</button>
        <button onclick="saveFirebaseConfig()" class="px-4 py-2 bg-emerald-600 text-white rounded-xl font-bold text-xs">儲存並連線</button>
      </div>
    </div>
  </div>

  <script>
    let appData = {
      config: { className: "我們的班級小宇宙", semester: "114學年度上學期", currencyName: "💰元" },
      students: {},
      homeworks: [
        { id: 'hw_1', title: '預設國語作業', reward: 30 }
      ],
      quickButtons: [
        { id: 'q1', name: '🌟 今日表揚', amount: 50 },
        { id: 'q2', name: '🧹 掃地認真', amount: 20 }
      ]
    };

    let db = null;
    let isAdminUnlocked = false;

    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    function openModal(id) { document.getElementById(id).classList.remove('hidden'); }

    function clearLocalCache() {
      if (confirm("確定要清除本機暫存嗎？")) {
        localStorage.removeItem('class_space_data');
        location.reload();
      }
    }

    function switchTab(tab) {
      if (tab === 'admin' && !isAdminUnlocked) {
        const pwd = prompt("🔒 請輸入教師後台解鎖密碼：");
        if (pwd === "1102") {
          isAdminUnlocked = true;
        } else {
          alert("❌ 密碼錯誤！");
          return;
        }
      }
      ['submit', 'view', 'admin'].forEach(t => document.getElementById('sec-' + t).classList.add('hidden'));
      document.getElementById('sec-' + tab).classList.remove('hidden');
    }

    function switchAdminTab(atab) {
      ['quick', 'students', 'hw', 'settings'].forEach(t => {
        document.getElementById('asec-' + t).classList.add('hidden');
        document.getElementById('atab-' + t).className = "px-4 py-2 font-bold text-gray-500 whitespace-nowrap";
      });
      document.getElementById('asec-' + atab).classList.remove('hidden');
      document.getElementById('atab-' + atab).className = "px-4 py-2 font-bold tab-active whitespace-nowrap";
    }

    function renderUI() {
      document.getElementById('header-class-name').innerText = appData.config.className;
      document.getElementById('currency-tag').innerText = `貨幣：${appData.config.currencyName}`;
      document.getElementById('cfg-class-name').value = appData.config.className;
      document.getElementById('cfg-currency-name').value = appData.config.currencyName;

      // 1. 前台排行榜
      const grid = document.getElementById('student-cards-grid');
      grid.innerHTML = '';
      Object.values(appData.students).sort((a,b)=>a.seat-b.seat).forEach(s => {
        grid.innerHTML += `
          <div class="bg-gray-50 p-4 rounded-xl text-center border shadow-sm">
            <div class="text-xs text-gray-400 font-bold">${s.seat} 號</div>
            <div class="font-bold text-gray-700">${s.name}</div>
            <div class="text-emerald-600 font-extrabold mt-1">${s.balance} <span class="text-xs">${appData.config.currencyName}</span></div>
          </div>`;
      });

      // 2. 下拉選單
      const stSelect = document.getElementById('submit-student-select');
      const adminStSelect = document.getElementById('admin-quick-student-select');
      stSelect.innerHTML = ''; adminStSelect.innerHTML = '';
      Object.values(appData.students).sort((a,b)=>a.seat-b.seat).forEach(s => {
        const opt = `<option value="${s.id}">${s.seat} 號 ${s.name}</option>`;
        stSelect.innerHTML += opt;
        adminStSelect.innerHTML += opt;
      });

      // 3. 作業選單與作業規則清單
      const hwSelect = document.getElementById('submit-hw-select');
      const hwRuleList = document.getElementById('hw-rule-list');
      hwSelect.innerHTML = '';
      hwRuleList.innerHTML = '';
      
      appData.homeworks.forEach(h => {
        hwSelect.innerHTML += `<option value="${h.id}">${h.title} ( +${h.reward} ${appData.config.currencyName} )</option>`;
        hwRuleList.innerHTML += `
          <li class="p-3 bg-gray-50 border rounded-xl flex justify-between items-center">
            <span class="font-bold text-gray-700">${h.title} <span class="text-emerald-600 text-xs">(+${h.reward} ${appData.config.currencyName})</span></span>
            <button onclick="deleteHomework('${h.id}')" class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded hover:bg-red-200">🗑️ 刪除</button>
          </li>`;
      });

      // 4. 後台學生列表
      const adminStList = document.getElementById('admin-student-list');
      adminStList.innerHTML = '';
      Object.values(appData.students).sort((a,b)=>a.seat-b.seat).forEach(s => {
        adminStList.innerHTML += `
          <div class="p-3 bg-white border rounded-xl space-y-2 shadow-sm">
            <div class="flex justify-between items-center">
              <div>
                <span class="text-xs text-gray-400 font-bold">${s.seat}號</span>
                <span class="font-bold text-gray-800 ml-1">${s.name}</span>
              </div>
              <div class="flex gap-1">
                <button onclick="openEditStudentModal('${s.id}')" class="text-xs bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded">✏️ 編輯</button>
                <button onclick="deleteStudent('${s.id}')" class="text-xs bg-red-50 text-red-600 hover:bg-red-100 px-2 py-1 rounded">🗑️ 刪除</button>
              </div>
            </div>
            <div onclick="openAdjustModal('${s.id}')" class="p-2 bg-emerald-50 rounded-lg flex justify-between items-center cursor-pointer hover:bg-emerald-100">
              <span class="text-xs font-bold text-emerald-800">資產：${s.balance} ${appData.config.currencyName}</span>
              <span class="text-xs text-emerald-600 font-bold">加減分 ➔</span>
            </div>
          </div>`;
      });

      // 5. 快速表揚按鈕
      const qContainer = document.getElementById('quick-btn-container');
      qContainer.innerHTML = '';
      appData.quickButtons.forEach(q => {
        qContainer.innerHTML += `
          <button onclick="triggerQuickReward('${q.name}', ${q.amount})" class="px-3 py-2 bg-white hover:bg-emerald-100 text-emerald-800 rounded-xl font-bold text-sm border border-emerald-300 shadow-sm">
            ${q.name} (+${q.amount})
          </button>`;
      });
    }

    // --- 新增 / 刪除 作業項目 ---
    function addHomework() {
      const title = document.getElementById('new-hw-title').value.trim();
      let rawReward = document.getElementById('new-hw-reward').value.trim();
      
      // 自動清掉多餘的 '+' 號
      rawReward = rawReward.replace('+', '');
      const reward = parseInt(rawReward);

      if (!title) return alert('⚠️ 請輸入作業名稱！');
      if (isNaN(reward)) return alert('⚠️ 請輸入有效的獎勵數字！');

      const id = 'hw_' + Date.now();
      appData.homeworks.push({ id, title, reward });
      
      document.getElementById('new-hw-title').value = '';
      document.getElementById('new-hw-reward').value = '30';
      
      syncData();
      alert(`🎉 成功新增作業項目：「${title}」！`);
    }

    function deleteHomework(hwId) {
      if (confirm('確定要刪除這項作業規則嗎？')) {
        appData.homeworks = appData.homeworks.filter(h => h.id !== hwId);
        syncData();
      }
    }

    // --- 學生編輯與刪除 ---
    function openEditStudentModal(stId) {
      document.getElementById('edit-st-id').value = stId;
      document.getElementById('edit-st-name-input').value = appData.students[stId].name;
      openModal('modal-edit-student');
    }

    function saveStudentName() {
      const stId = document.getElementById('edit-st-id').value;
      const newName = document.getElementById('edit-st-name-input').value.trim();
      if (newName) {
        appData.students[stId].name = newName;
        closeModal('modal-edit-student');
        syncData();
      }
    }

    function deleteStudent(stId) {
      const st = appData.students[stId];
      if (confirm(`確定要刪除 ${st.seat}號 ${st.name} 嗎？`)) {
        delete appData.students[stId];
        syncData();
      }
    }

    function confirmClearAllStudents() {
      if (confirm("⚠️ 確定要清空全班學生資料嗎？此動作無法撤銷！")) {
        appData.students = {};
        syncData();
      }
    }

    function addNewStudent() {
      const seat = parseInt(document.getElementById('new-st-seat').value);
      const name = document.getElementById('new-st-name').value.trim();
      if (!seat || !name) return alert('請填寫座號與姓名！');
      const id = 's' + seat;
      appData.students[id] = { id, seat, name, balance: appData.students[id]?.balance || 0 };
      document.getElementById('new-st-seat').value = '';
      document.getElementById('new-st-name').value = '';
      syncData();
    }

    // --- 批次解析邏輯 ---
    function processBatchInput() {
      const rawText = document.getElementById('batch-excel-input').value.trim();
      if (!rawText) return alert('⚠️ 輸入框是空的，請先貼上內容！');

      let count = 0;
      const lines = rawText.split('\n');

      lines.forEach(line => {
        const match = line.match(/(\d+)\s*[\t,,\s]+\s*([^\s\t,]+)/);
        if (match) {
          const seat = parseInt(match[1]);
          const name = match[2].trim();
          if (!isNaN(seat) && name && name !== '姓名' && name !== '座號') {
            const id = 's' + seat;
            appData.students[id] = { id, seat, name, balance: appData.students[id]?.balance || 0 };
            count++;
          }
        }
      });

      if (count > 0) {
        document.getElementById('batch-excel-input').value = '';
        syncData();
        alert(`🎉 成功匯入 ${count} 位學生！`);
      } else {
        alert('❌ 找不到有效的「座號」與「姓名」資料。請確定內容包含數字與姓名！');
      }
    }

    function handleExcelUpload(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(evt) {
        try {
          const data = new Uint8Array(evt.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
          
          let textResult = '';
          rows.forEach(row => {
            if (row && row.length >= 2) {
              textResult += `${row[0]}\t${row[1]}\n`;
            }
          });
          document.getElementById('batch-excel-input').value = textResult;
          processBatchInput();
        } catch(err) {
          alert('解析 Excel 檔案失敗，建議直接複製 Excel 文字並貼上！');
        }
      };
      reader.readAsArrayBuffer(file);
    }

    // --- 資產調整與作業加分 ---
    function openAdjustModal(stId) {
      document.getElementById('adjust-student-id').value = stId;
      document.getElementById('adjust-modal-title').innerText = `調整 ${appData.students[stId].name} 的資產`;
      openModal('modal-adjust');
    }

    function submitStudentAdjust() {
      const stId = document.getElementById('adjust-student-id').value;
      const amount = parseInt(document.getElementById('adjust-amount').value);
      if (isNaN(amount)) return alert('請輸入有效數字！');
      appData.students[stId].balance += amount;
      closeModal('modal-adjust');
      syncData();
    }

    function handleQuickSubmit() {
      const stId = document.getElementById('submit-student-select').value;
      const hwId = document.getElementById('submit-hw-select').value;
      const hw = appData.homeworks.find(h => h.id === hwId);
      if (!stId || !hw) return alert('請選擇作業與學生！');
      appData.students[stId].balance += hw.reward;
      alert(`🎉 ${appData.students[stId].name} 完成「${hw.title}」，獲得 +${hw.reward} ${appData.config.currencyName}！`);
      syncData();
    }

    function triggerQuickReward(reason, amount) {
      const stId = document.getElementById('admin-quick-student-select').value;
      if (!stId) return alert('請先選擇學生！');
      appData.students[stId].balance += amount;
      alert(`🌟 ${appData.students[stId].name} 【${reason}】 +${amount} ${appData.config.currencyName}！`);
      syncData();
    }

    function saveClassSettings() {
      appData.config.className = document.getElementById('cfg-class-name').value;
      appData.config.currencyName = document.getElementById('cfg-currency-name').value;
      syncData();
      alert('✅ 設定已更新！');
    }

    function syncData() {
      renderUI();
      localStorage.setItem('class_space_data', JSON.stringify(appData));
      if (db) db.ref('appData').set(appData);
    }

    // Firebase 連線設定
    function openFirebaseModal() { openModal('modal-firebase'); }
    function saveFirebaseConfig() {
      const raw = document.getElementById('firebase-config-input').value;
      localStorage.setItem('firebase_config_raw', raw);
      location.reload();
    }

    window.onload = function() {
      const local = localStorage.getItem('class_space_data');
      if (local) appData = JSON.parse(local);
      renderUI();
    };
  </script>
</body>
</html>
