<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>我們的班級小宇宙｜夢幻獎勵屋</title>
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-amber-50/30 min-h-screen p-4 md:p-6">

  <div class="max-w-7xl mx-auto space-y-6">

    <!-- 1. 最上方：Firebase 狀態列 -->
    <div class="bg-teal-400 text-white px-4 py-2 rounded-full flex justify-between items-center shadow-sm">
      <div class="flex items-center gap-2 text-sm font-medium">
        <span>☁️</span> Firebase 雲端即時同步中
      </div>
      <div class="flex gap-2">
        <button class="bg-white/90 hover:bg-white text-gray-700 text-xs px-3 py-1.5 rounded-full font-medium transition flex items-center gap-1">
          🧹 清除暫存
        </button>
        <button class="bg-pink-500 hover:bg-pink-600 text-white text-xs px-3 py-1.5 rounded-full font-medium transition flex items-center gap-1">
          ⚙️ 設定雲端同步
        </button>
      </div>
    </div>

    <!-- 2. 第二區：標題與功能按鈕大卡片 -->
    <div class="bg-white rounded-3xl p-6 shadow-sm border border-orange-100 flex flex-col md:flex-row justify-between items-center gap-4">
      <div>
        <h1 class="text-2xl md:text-3xl font-extrabold text-red-500 flex items-center gap-2">
          ✨ 我們的班級小宇宙｜夢幻獎勵屋
        </h1>
        <p class="text-xs text-gray-400 mt-1">快樂作業繳交 × 班級可愛銀行</p>
      </div>
      <div class="flex flex-wrap gap-2">
        <button class="bg-teal-500 hover:bg-teal-600 text-white text-sm px-4 py-2 rounded-xl font-medium transition flex items-center gap-1">
          📷 條碼繳交
        </button>
        <button class="bg-amber-400 hover:bg-amber-500 text-white text-sm px-4 py-2 rounded-xl font-medium transition flex items-center gap-1">
          🐣 學生檢視
        </button>
        <button class="bg-gray-800 hover:bg-gray-900 text-white text-sm px-4 py-2 rounded-xl font-medium transition flex items-center gap-1">
          🔒 教師後台
        </button>
      </div>
    </div>

    <!-- 3. 第三區：下方左右雙欄區塊（財富排行榜與作業狀態） -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

      <!-- ⬅️ 左側區塊：班級財富排行榜 -->
      <div class="bg-white rounded-3xl p-6 shadow-sm border border-orange-100">
        <div class="flex justify-between items-center mb-2">
          <h3 class="text-lg font-bold text-gray-800 flex items-center gap-2">
            🏆 班級財富排行榜
          </h3>
          <span class="text-sm bg-orange-50 text-orange-600 px-3 py-1 rounded-full font-medium border border-orange-100">
            貨幣：💰 元
          </span>
        </div>
        <p class="text-xs text-gray-400 mb-4">💡 點擊學生卡片可查詢個人資產明細、作業繳交狀態與訂正狀況</p>

        <!-- 學生卡片列表 -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <!-- 學生 1 -->
          <div class="border border-gray-100 rounded-2xl p-4 hover:shadow-md transition cursor-pointer bg-white">
            <div class="text-xs text-gray-400 text-center mb-1">1 號</div>
            <div class="text-base font-bold text-gray-800 text-center mb-2">張哈哈</div>
            <div class="text-lg font-extrabold text-amber-500 text-center mb-3">
              30 <span class="text-sm">💰 元</span>
            </div>
            <div class="text-center">
              <button class="text-xs text-blue-600 hover:underline inline-flex items-center gap-1">
                🔍 查詢作業與明細
              </button>
            </div>
          </div>

          <!-- 學生 2 -->
          <div class="border border-gray-100 rounded-2xl p-4 hover:shadow-md transition cursor-pointer bg-white">
            <div class="text-xs text-gray-400 text-center mb-1">2 號</div>
            <div class="text-base font-bold text-gray-800 text-center mb-2">張咚咚</div>
            <div class="text-lg font-extrabold text-amber-500 text-center mb-3">
              0 <span class="text-sm">💰 元</span>
            </div>
            <div class="text-center">
              <button class="text-xs text-blue-600 hover:underline inline-flex items-center gap-1">
                🔍 查詢作業與明細
              </button>
            </div>
          </div>

          <!-- 學生 3 -->
          <div class="border border-gray-100 rounded-2xl p-4 hover:shadow-md transition cursor-pointer bg-white">
            <div class="text-xs text-gray-400 text-center mb-1">3 號</div>
            <div class="text-base font-bold text-gray-800 text-center mb-2">張朵朵</div>
            <div class="text-lg font-extrabold text-amber-500 text-center mb-3">
              70 <span class="text-sm">💰 元</span>
            </div>
            <div class="text-center">
              <button class="text-xs text-blue-600 hover:underline inline-flex items-center gap-1">
                🔍 查詢作業與明細
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- ➡️ 右側區塊：作業繳交狀態 -->
      <div class="bg-white rounded-3xl p-6 shadow-sm border border-orange-100">
        <div class="flex justify-between items-center mb-2">
          <h3 class="text-lg font-bold text-gray-800 flex items-center gap-2">
            📚 作業繳交狀態
          </h3>
          <span class="text-sm bg-blue-50 text-blue-600 px-3 py-1 rounded-full font-medium border border-blue-100">
            已繳交：2/3
          </span>
        </div>
        <p class="text-xs text-gray-400 mb-4">💡 掌握全班即時繳交與訂正進度</p>

        <!-- 作業狀態列表 -->
        <div class="space-y-3">
          <div class="flex items-center justify-between p-3 rounded-xl border border-gray-100 bg-gray-50/50">
            <div class="flex items-center gap-3">
              <span class="text-xs text-gray-400 w-8">1 號</span>
              <span class="font-bold text-gray-800">張哈哈</span>
            </div>
            <span class="text-xs bg-green-100 text-green-700 px-2.5 py-1 rounded-lg font-medium">✅ 已交</span>
          </div>

          <div class="flex items-center justify-between p-3 rounded-xl border border-gray-100 bg-gray-50/50">
            <div class="flex items-center gap-3">
              <span class="text-xs text-gray-400 w-8">2 號</span>
              <span class="font-bold text-gray-800">張咚咚</span>
            </div>
            <span class="text-xs bg-red-100 text-red-700 px-2.5 py-1 rounded-lg font-medium">❌ 未交</span>
          </div>

          <div class="flex items-center justify-between p-3 rounded-xl border border-gray-100 bg-gray-50/50">
            <div class="flex items-center gap-3">
              <span class="text-xs text-gray-400 w-8">3 號</span>
              <span class="font-bold text-gray-800">張朵朵</span>
            </div>
            <span class="text-xs bg-green-100 text-green-700 px-2.5 py-1 rounded-lg font-medium">✅ 已交</span>
          </div>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
