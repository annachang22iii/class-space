<!-- 下方主內容區塊：改為 Grid 左右雙欄 (在大螢幕下 2 欄，手機版自動變 1 欄) -->
<div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6">

  <!-- ⬅️ 左側區塊：班級財富排行榜 -->
  <div class="bg-white rounded-3xl p-6 shadow-sm border border-orange-100">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-lg font-bold text-gray-800 flex items-center gap-2">
        🏆 班級財富排行榜
      </h3>
      <span class="text-sm bg-orange-50 text-orange-600 px-3 py-1 rounded-full font-medium">
        貨幣：💰 元
      </span>
    </div>
    <p class="text-xs text-gray-400 mb-4">💡 點擊學生卡片可查詢個人資產明細</p>

    <!-- 學生卡片列表 -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
      <!-- 學生卡片範例 1 -->
      <div class="border border-gray-100 rounded-2xl p-4 hover:shadow-md transition cursor-pointer bg-white">
        <div class="text-xs text-gray-400 text-center mb-1">1 號</div>
        <div class="text-base font-bold text-gray-800 text-center mb-2">張哈哈</div>
        <div class="text-lg font-extrabold text-amber-500 text-center mb-3">
          30 <span class="text-sm">💰 元</span>
        </div>
        <div class="text-center">
          <button class="text-xs text-blue-600 hover:underline inline-flex items-center gap-1">
            🔍 查詢作業與明細
          </button>
        </div>
      </div>

      <!-- 學生卡片範例 2 -->
      <div class="border border-gray-100 rounded-2xl p-4 hover:shadow-md transition cursor-pointer bg-white">
        <div class="text-xs text-gray-400 text-center mb-1">2 號</div>
        <div class="text-base font-bold text-gray-800 text-center mb-2">張咚咚</div>
        <div class="text-lg font-extrabold text-amber-500 text-center mb-3">
          0 <span class="text-sm">💰 元</span>
        </div>
        <div class="text-center">
          <button class="text-xs text-blue-600 hover:underline inline-flex items-center gap-1">
            🔍 查詢作業與明細
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ➡️ 右側區塊：作業繳交狀態 -->
  <div class="bg-white rounded-3xl p-6 shadow-sm border border-orange-100">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-lg font-bold text-gray-800 flex items-center gap-2">
        📚 作業繳交狀態
      </h3>
      <span class="text-sm bg-blue-50 text-blue-600 px-3 py-1 rounded-full font-medium">
        已繳交：2/3
      </span>
    </div>
    <p class="text-xs text-gray-400 mb-4">💡 掌握全班即時繳交與訂正進度</p>

    <!-- 作業狀態列表 -->
    <div class="space-y-3">
      <!-- 狀態項目 1 -->
      <div class="flex items-center justify-between p-3 rounded-xl border border-gray-100 bg-gray-50/50">
        <div class="flex items-center gap-3">
          <span class="text-xs text-gray-400 w-8">1 號</span>
          <span class="font-bold text-gray-800">張哈哈</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="text-xs bg-green-100 text-green-700 px-2.5 py-1 rounded-lg font-medium">✅ 已交</span>
        </div>
      </div>

      <!-- 狀態項目 2 -->
      <div class="flex items-center justify-between p-3 rounded-xl border border-gray-100 bg-gray-50/50">
        <div class="flex items-center gap-3">
          <span class="text-xs text-gray-400 w-8">2 號</span>
          <span class="font-bold text-gray-800">張咚咚</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="text-xs bg-red-100 text-red-700 px-2.5 py-1 rounded-lg font-medium">❌ 未交</span>
        </div>
      </div>

      <!-- 狀態項目 3 -->
      <div class="flex items-center justify-between p-3 rounded-xl border border-gray-100 bg-gray-50/50">
        <div class="flex items-center gap-3">
          <span class="text-xs text-gray-400 w-8">3 號</span>
          <span class="font-bold text-gray-800">張朵朵</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="text-xs bg-green-100 text-green-700 px-2.5 py-1 rounded-lg font-medium">✅ 已交</span>
        </div>
      </div>
    </div>
  </div>

</div>
